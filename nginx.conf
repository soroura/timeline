# EC + DP Timeline 2026 — nginx vhost
# Drop in as /etc/nginx/sites-available/timeline.endura.assess.com on your existing VPS.
# Safe for multi-site VPS: server_name is exact match (no catch-all).

server {
    listen       80;
    listen       [::]:80;
    server_name  timeline.endura.assess.com;     # ← exact match only; no catch-all

    root   /var/www/timeline;
    index  index.html;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript text/html application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache /assets/ for 7 days
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Clean URLs — /layer-1 → /layer-1.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Access/error logs scoped to this site
    access_log /var/log/nginx/timeline.access.log;
    error_log  /var/log/nginx/timeline.error.log;
}
