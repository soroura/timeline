# EC + DP Timeline 2026 — nginx config
# Serve static site at root; clean URLs for .html pages.

server {
    listen       80;
    server_name  timeline.endura.assess.com _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript text/html application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache assets for 7 days
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Clean URLs — allow /layer-1 → /layer-1.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
